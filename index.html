<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trigosynth - Listen to mathematical formulas</title>
  <link rel="stylesheet" href="style.css" />

</head>
<body>
  <main class="app">
    <section class="formula-section">
      <textarea
        id="formula"
        spellcheck="false"
      >(sin(2*pi*f*t) + 0.4*sin(2*pi*2*f*t) + 0.2*sin(2*pi*3*f*t)) * exp(-decay*t)</textarea>

      <div class="formula-row">
        <select id="formulaPreset">
          <option value="piano">Piano</option>
          <option value="violin">Violin</option>
          <option value="bell">Bell</option>
          <option value="organ">Organ</option>
          <option value="bass">Bass</option>
          <option value="sine">Sine</option>
          <option value="seesaw">Seesaw</option>
          <option value="8bit">8-bit</option>
          <option value="custom">Custom</option>
        </select>

        <div id="formulaStatus">Formula OK</div>
      </div>
    </section>

    <section class="waveform-section">
      <canvas id="waveform"></canvas>
    </section>

    <section class="piano-section">
      <div class="piano" id="piano"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
